<script type="module">
    import { auth, db } from './js/firebase.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
    import { 
        doc, getDoc, collection, query, orderBy, getDocs, limit, startAfter 
    } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

    let currentUser = null;
    let lastVisible = null; // Для пагинации
    let hasMore = true; // Есть ли ещё данные
    let allDescriptions = []; // Кэш для фильтрации
    let currentPage = 1;
    const DESCRIPTIONS_PER_PAGE = 10;

    console.log('🚀 Скрипт истории описаний загружен');

    // Функция для безопасного экранирования HTML
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Проверка авторизации
    onAuthStateChanged(auth, async (user) => {
        console.log('👤 Auth state changed:', user ? user.uid : 'no user');
        
        if (!user) {
            window.location.href = '/login.html';
            return;
        }
        currentUser = user;
        await loadUserData();
        await loadInitialDescriptions(); // Загружаем только первые 10
    });

    // Загрузка данных пользователя
    async function loadUserData() {
        try {
            const userDoc = await getDoc(doc(db, 'users', currentUser.uid));
            if (userDoc.exists()) {
                const userData = userDoc.data();
                document.getElementById('sidebarBalance').textContent = userData.balance || 0;
                document.getElementById('userEmail').textContent = userData.email || currentUser.email || 'Пользователь';
            }
        } catch (error) {
            console.error('Ошибка загрузки данных:', error);
        }
    }

    // Загрузка первых 10 описаний
    async function loadInitialDescriptions() {
        try {
            console.log('📥 Загружаем первые описания...');
            
            const descriptionsRef = collection(db, 'users', currentUser.uid, 'descriptions');
            const q = query(descriptionsRef, orderBy('createdAt', 'desc'), limit(DESCRIPTIONS_PER_PAGE));
            const snapshot = await getDocs(q);
            
            console.log('📊 Загружено документов:', snapshot.size);
            
            if (snapshot.empty) {
                showEmptyState();
                return;
            }
            
            // Сохраняем последний документ для следующей загрузки
            lastVisible = snapshot.docs[snapshot.docs.length - 1];
            hasMore = snapshot.docs.length === DESCRIPTIONS_PER_PAGE;
            
            // Преобразуем документы
            allDescriptions = snapshot.docs.map(doc => ({
                id: doc.id,
                ...doc.data()
            }));

            // Обновляем статистику (нужно отдельно получить общее количество)
            await loadTotalStats();
            
            // Отображаем
            filteredDescriptions = [...allDescriptions];
            displayDescriptions();

        } catch (error) {
            console.error('❌ Ошибка загрузки описаний:', error);
            showErrorState(error.message);
        }
    }

    // Загрузка следующих 10 описаний
    async function loadMoreDescriptions() {
        if (!hasMore || !lastVisible) return;
        
        try {
            console.log('📥 Загружаем следующие описания...');
            
            const descriptionsRef = collection(db, 'users', currentUser.uid, 'descriptions');
            const q = query(
                descriptionsRef, 
                orderBy('createdAt', 'desc'), 
                startAfter(lastVisible),
                limit(DESCRIPTIONS_PER_PAGE)
            );
            const snapshot = await getDocs(q);
            
            console.log('📊 Загружено еще документов:', snapshot.size);
            
            if (snapshot.empty) {
                hasMore = false;
                return;
            }
            
            lastVisible = snapshot.docs[snapshot.docs.length - 1];
            hasMore = snapshot.docs.length === DESCRIPTIONS_PER_PAGE;
            
            const newDescriptions = snapshot.docs.map(doc => ({
                id: doc.id,
                ...doc.data()
            }));
            
            allDescriptions = [...allDescriptions, ...newDescriptions];
            filteredDescriptions = [...allDescriptions];
            
            displayDescriptions();

        } catch (error) {
            console.error('❌ Ошибка загрузки следующих описаний:', error);
        }
    }

    // Получение общего количества для статистики (быстрый подсчет)
    async function loadTotalStats() {
        try {
            // Используем aggregation query (если Firebase поддерживает)
            // Или просто считаем то, что загрузили + показываем "более X"
            const totalCount = allDescriptions.length;
            const totalSpent = allDescriptions.reduce((sum, desc) => sum + (desc.cost || 50), 0);
            
            document.getElementById('totalDescriptions').textContent = totalCount + (hasMore ? '+' : '');
            document.getElementById('totalSpent').textContent = totalSpent + (hasMore ? '+' : '');
            
            const lastDate = allDescriptions.length > 0 && allDescriptions[0].createdAt
                ? new Date(allDescriptions[0].createdAt).toLocaleDateString('ru-RU')
                : '—';
            document.getElementById('lastDate').textContent = lastDate;
            
        } catch (error) {
            console.error('Ошибка подсчета статистики:', error);
        }
    }

    function showEmptyState() {
        document.getElementById('descriptionsList').innerHTML = `
            <div class="empty-state">
                <div class="icon">📝</div>
                <h3>История пуста</h3>
                <p>Сгенерируйте первое описание товара</p>
                <a href="/description.html" class="btn btn-primary">✨ Создать описание</a>
            </div>
        `;
        document.getElementById('pagination').innerHTML = '';
    }

    function showErrorState(message) {
        document.getElementById('descriptionsList').innerHTML = `
            <div class="empty-state">
                <div class="icon">⚠️</div>
                <h3>Ошибка загрузки</h3>
                <p>${message}</p>
            </div>
        `;
    }

    // Отображение описаний
    function displayDescriptions() {
        const list = document.getElementById('descriptionsList');
        
        if (filteredDescriptions.length === 0) {
            list.innerHTML = `
                <div class="empty-state">
                    <div class="icon">🔍</div>
                    <h3>Ничего не найдено</h3>
                    <p>Попробуйте изменить параметры поиска</p>
                </div>
            `;
            return;
        }

        list.innerHTML = filteredDescriptions.map(desc => {
            // Безопасное форматирование даты
            let dateStr = 'Дата неизвестна';
            if (desc.createdAt) {
                try {
                    const date = new Date(desc.createdAt);
                    if (!isNaN(date.getTime())) {
                        dateStr = date.toLocaleString('ru-RU', {
                            day: '2-digit', month: '2-digit', year: 'numeric',
                            hour: '2-digit', minute: '2-digit'
                        });
                    }
                } catch (e) {}
            }
            
            // Безопасное получение preview
            let preview = 'Описание отсутствует';
            if (desc.description && typeof desc.description === 'string') {
                preview = desc.description.length > 300 
                    ? desc.description.substring(0, 300) + '...' 
                    : desc.description;
            }
            
            const productName = desc.productName || 'Без названия';
            const platform = desc.platform === 'ozon' ? 'ozon' : 'wb';
            const platformName = platform === 'wb' ? 'Wildberries' : 'Ozon';
            const platformClass = platform === 'wb' ? 'wb' : 'ozon';
            const cost = desc.cost || 50;
            
            return `
                <div class="description-item" onclick="openDescription('${desc.id}')">
                    <div class="description-header">
                        <div class="description-title">
                            <h3>${escapeHtml(productName)}</h3>
                            <span class="platform-badge ${platformClass}">
                                ${platformName}
                            </span>
                        </div>
                        <div class="description-meta">
                            <span>📅 ${escapeHtml(dateStr)}</span>
                            <span>💰 ${cost} ₽</span>
                        </div>
                    </div>
                    
                    <div class="description-preview">
                        ${escapeHtml(preview)}
                    </div>
                    
                    <div class="description-footer">
                        <div class="description-actions">
                            <button class="btn btn-small btn-outline" onclick="event.stopPropagation(); copyDescription('${desc.id}')">📋 Копировать</button>
                            <button class="btn btn-small btn-outline" onclick="event.stopPropagation(); openDescription('${desc.id}')">🔍 Подробнее</button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');

        // Добавляем кнопку "Загрузить ещё", если есть данные
        if (hasMore) {
            const loadMoreBtn = document.createElement('div');
            loadMoreBtn.style.textAlign = 'center';
            loadMoreBtn.style.marginTop = '30px';
            loadMoreBtn.innerHTML = '<button class="btn btn-outline" onclick="loadMore()">⬇️ Загрузить ещё</button>';
            list.appendChild(loadMoreBtn);
        }
    }

    // Загрузка ещё
    window.loadMore = async function() {
        await loadMoreDescriptions();
    };

    // Фильтрация (только по загруженным данным)
    window.applyFilters = function() {
        const platform = document.getElementById('platformFilter').value;
        const search = document.getElementById('searchInput').value.toLowerCase();

        filteredDescriptions = allDescriptions.filter(desc => {
            if (platform !== 'all' && desc.platform !== platform) return false;
            if (search && desc.productName && !desc.productName.toLowerCase().includes(search)) return false;
            return true;
        });

        displayDescriptions();
    };

    // Копирование описания
    window.copyDescription = async function(id) {
        const desc = allDescriptions.find(d => d.id === id);
        if (desc && desc.description) {
            await navigator.clipboard.writeText(desc.description);
            alert('✅ Описание скопировано в буфер обмена');
        } else {
            alert('❌ Описание отсутствует');
        }
    };

    // Открытие модального окна
    window.openDescription = function(id) {
        const desc = allDescriptions.find(d => d.id === id);
        if (desc) {
            document.getElementById('modalProductName').textContent = desc.productName || 'Без названия';
            
            const platform = desc.platform === 'ozon' ? 'ozon' : 'wb';
            document.getElementById('modalPlatform').textContent = platform === 'wb' ? 'Wildberries' : 'Ozon';
            document.getElementById('modalPlatform').className = `platform-badge ${platform === 'wb' ? 'wb' : 'ozon'}`;
            
            let dateStr = 'Дата неизвестна';
            if (desc.createdAt) {
                try {
                    const date = new Date(desc.createdAt);
                    if (!isNaN(date.getTime())) {
                        dateStr = date.toLocaleString('ru-RU');
                    }
                } catch (e) {}
            }
            document.getElementById('modalDate').textContent = dateStr;
            
            document.getElementById('modalPrice').textContent = desc.cost || 50;
            document.getElementById('modalDescription').textContent = desc.description || 'Описание отсутствует';
            
            document.getElementById('descriptionModal').classList.add('show');
        }
    };

    window.copyModalDescription = async function() {
        const text = document.getElementById('modalDescription').textContent;
        await navigator.clipboard.writeText(text);
        alert('✅ Описание скопировано');
    };

    window.closeModal = function() {
        document.getElementById('descriptionModal').classList.remove('show');
    };

    // Навигация
    window.navigateTo = function(section) {
        const paths = {
            'news': '/news.html',
            'balance': '/balance.html',
            'generate': '/generate.html',
            'description': '/description.html',
            'description-history': '/description-history.html',
            'history': '/history.html',
            'settings': '/settings.html'
        };
        if (paths[section]) {
            window.location.href = paths[section];
        }
    };

    window.logout = async function() {
        await auth.signOut();
        window.location.href = '/login.html';
    };

    // Обработчики фильтров
    document.addEventListener('DOMContentLoaded', function() {
        const platformFilter = document.getElementById('platformFilter');
        const searchInput = document.getElementById('searchInput');
        
        if (platformFilter) platformFilter.addEventListener('change', applyFilters);
        if (searchInput) searchInput.addEventListener('input', applyFilters);
        
        document.querySelectorAll('.menu-item').forEach(item => {
            item.addEventListener('click', function(e) {
                const section = this.dataset.section;
                navigateTo(section);
            });
        });
    });
</script>
