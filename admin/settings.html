<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройки — Prodiger Admin</title>
    <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
    <div class="admin-wrapper">
        <!-- Боковое меню -->
        <div class="admin-sidebar">
            <div class="admin-sidebar-logo">Prodiger Admin</div>
            <ul class="admin-sidebar-menu">
                <li><a href="dashboard.html"><i>📊</i> Дашборд</a></li>
                <li><a href="users.html"><i>👥</i> Пользователи</a></li>
                <li><a href="generations.html"><i>🖼️</i> Генерации</a></li>
                <li><a href="logs.html"><i>📝</i> Логи</a></li>
                <li><a href="settings.html" class="active"><i>⚙️</i> Настройки</a></li>
                <li style="margin-top: 30px;"><a href="#" onclick="logout()"><i>🚪</i> Выйти</a></li>
            </ul>
        </div>
        
        <!-- Основной контент -->
        <div class="admin-content">
            <div class="admin-header">
                <h1>Настройки сайта</h1>
            </div>
            
            <div class="settings-grid">
                <!-- Основные настройки -->
                <div class="settings-card glass">
                    <h3>Основные</h3>
                    
                    <div class="form-group">
                        <label>Название сайта</label>
                        <input type="text" id="siteName" value="Prodiger">
                    </div>
                    
                    <div class="form-group">
                        <label>Бесплатных рублей при регистрации</label>
                        <input type="number" id="welcomeBonus" value="500" min="0">
                    </div>
                    
                    <div class="form-group">
                        <label>Стоимость генерации (₽)</label>
                        <input type="number" id="genPrice" value="100" min="1" readonly disabled>
                        <small>Фиксированная цена</small>
                    </div>
                </div>
                
                <!-- Технические настройки -->
                <div class="settings-card glass">
                    <h3>Технические</h3>
                    
                    <div class="form-group">
                        <label>Статус API Gemini</label>
                        <div class="status-badge" id="apiStatus">Проверка...</div>
                    </div>
                    
                    <div class="form-group">
                        <label>Последний деплой</label>
                        <div id="lastDeploy">—</div>
                    </div>
                    
                    <button class="btn btn-outline" onclick="testGemini()">Тест Gemini</button>
                    <button class="btn btn-outline" onclick="clearCache()">Очистить кэш</button>
                </div>
                
                <!-- Безопасность -->
                <div class="settings-card glass">
                    <h3>Безопасность</h3>
                    
                    <div class="form-group">
                        <label>Требовать 2FA для админов</label>
                        <input type="checkbox" id="require2FA">
                    </div>
                    
                    <div class="form-group">
                        <label>Блокировка после неудачных попыток</label>
                        <input type="number" id="maxLoginAttempts" value="5" min="1">
                    </div>
                    
                    <button class="btn btn-primary" onclick="saveSettings()">Сохранить все</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="../js/admin.js"></script>
</body>
</html>
