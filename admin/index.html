<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — AI Seller</title>
    <link rel="stylesheet" href="../styles/main.css">
    <style>
        .admin-login {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0f1f 0%, #1a1f2f 100%);
        }
        .admin-login-card {
            background: rgba(30, 35, 45, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        .admin-logo {
            font-size: 36px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #2f6ed6, #6c5ce7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .admin-subtitle {
            text-align: center;
            color: #a0a8c0;
            margin-bottom: 30px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .admin-error {
            color: #ef4444;
            text-align: center;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="admin-login">
        <div class="admin-login-card">
            <div class="admin-logo">AI Seller</div>
            <div class="admin-subtitle">ADMIN PANEL</div>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="adminEmail" placeholder="admin@example.com">
            </div>
            
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="adminPassword" placeholder="••••••••">
            </div>
            
            <button class="btn btn-primary btn-block" onclick="adminLogin()">
                Войти в панель управления
            </button>
            
            <div id="adminError" class="admin-error"></div>
        </div>
    </div>

    <script type="module" src="../js/admin.js"></script>
</body>
</html>
