<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users — AI Seller Admin</title>
    <link rel="stylesheet" href="../styles/main.css">
    <style>
        .admin-wrapper { display: flex; }
        .admin-sidebar { width: 280px; background: #1a1d24; position: fixed; height: 100vh; }
        .admin-content { margin-left: 280px; padding: 30px; flex: 1; }
        
        .users-table {
            width: 100%;
            border-collapse: collapse;
            background: #1a1d24;
            border-radius: 12px;
            overflow: hidden;
        }
        .users-table th {
            text-align: left;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            color: #a0a8c0;
        }
        .users-table td {
            padding: 15px;
            border-bottom: 1px solid #2a2e36;
        }
        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-bar input {
            flex: 1;
            padding: 12px;
            background: #2a2e36;
            border: 1px solid #2a2e36;
            border-radius: 8px;
            color: white;
        }
    </style>
</head>
<body>
    <div class="admin-wrapper">
        <div class="admin-sidebar">
            <div class="admin-sidebar-logo">AI Seller Admin</div>
            <ul class="admin-sidebar-menu">
                <li><a href="dashboard.html">📊 Дашборд</a></li>
                <li><a href="users.html" class="active">👥 Пользователи</a></li>
                <li><a href="#" onclick="alert('В разработке')">💰 Платежи</a></li>
                <li><a href="#" onclick="alert('В разработке')">📝 Логи</a></li>
                <li style="margin-top: 30px;"><a href="#" onclick="logout()">🚪 Выйти</a></li>
            </ul>
        </div>
        
        <div class="admin-content">
            <div class="admin-header">
                <h1>Управление пользователями</h1>
            </div>
            
            <div class="search-bar">
                <input type="text" id="userSearch" placeholder="Поиск по email...">
                <button class="btn btn-primary" onclick="searchUsers()">Найти</button>
                <button class="btn btn-outline" onclick="exportUsers()">Экспорт CSV</button>
            </div>
            
            <table class="users-table">
                <thead>
                    <tr>
                        <th>Email</th>
                        <th>Тариф</th>
                        <th>Баланс</th>
                        <th>Генераций</th>
                        <th>Регистрация</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <tr><td colspan="6" style="text-align: center;">Загрузка...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script type="module" src="../js/admin.js"></script>
</body>
</html>
