<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — AI Seller</title>
    <link rel="stylesheet" href="../styles/main.css">
    <style>
        .admin-wrapper {
            display: flex;
            min-height: 100vh;
        }
        
        .admin-sidebar {
            width: 280px;
            background: rgba(20, 25, 35, 0.95);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255,255,255,0.05);
            padding: 30px 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        
        .admin-sidebar-logo {
            font-size: 24px;
            font-weight: 700;
            padding: 0 20px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            background: linear-gradient(135deg, #6c5ce7, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .admin-sidebar-menu {
            list-style: none;
            padding: 0;
        }
        
        .admin-sidebar-menu li {
            margin-bottom: 5px;
        }
        
        .admin-sidebar-menu a {
            display: block;
            padding: 12px 25px;
            color: #a0a8c0;
            text-decoration: none;
            transition: all 0.3s;
            border-left: 3px solid transparent;
        }
        
        .admin-sidebar-menu a:hover,
        .admin-sidebar-menu a.active {
            background: rgba(108, 92, 231, 0.1);
            color: white;
            border-left-color: #6c5ce7;
        }
        
        .admin-sidebar-menu a i {
            margin-right: 10px;
            width: 20px;
            display: inline-block;
        }
        
        .admin-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px;
        }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(30, 35, 45, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
        }
        
        .stat-title {
            color: #a0a8c0;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: white;
        }
        
        .recent-activity {
            background: rgba(30,35,45,0.7);
            border-radius: 16px;
            padding: 25px;
        }
        
        .activity-list {
            list-style: none;
            padding: 0;
        }
        
        .activity-item {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .activity-item:last-child {
            border-bottom: none;
        }
        
        .badge-success {
            background: rgba(16,185,129,0.1);
            color: #10b981;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="admin-wrapper">
        <div class="admin-sidebar">
            <div class="admin-sidebar-logo">AI Seller Admin</div>
            <ul class="admin-sidebar-menu">
                <li><a href="dashboard.html" class="active"><i>📊</i> Дашборд</a></li>
                <li><a href="users.html"><i>👥</i> Пользователи</a></li>
                <li><a href="#" onclick="alert('В разработке')"><i>💰</i> Платежи</a></li>
                <li><a href="#" onclick="alert('В разработке')"><i>📝</i> Логи</a></li>
                <li style="margin-top: 30px;"><a href="#" onclick="logout()"><i>🚪</i> Выйти</a></li>
            </ul>
        </div>
        
        <div class="admin-content">
            <div class="admin-header">
                <h1>Дашборд</h1>
                <div class="admin-user">
                    <span id="adminEmail">Загрузка...</span>
                    <span class="badge-success">Admin</span>
                </div>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-title">Пользователи</div>
                    <div class="stat-value" id="totalUsers">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Выручка</div>
                    <div class="stat-value" id="totalRevenue">0 ₽</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Генераций</div>
                    <div class="stat-value" id="totalGenerations">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Активных</div>
                    <div class="stat-value" id="activeUsers">0</div>
                </div>
            </div>
            
            <div class="recent-activity">
                <h2>Последние действия</h2>
                <ul class="activity-list" id="activityList">
                    <li class="activity-item">
                        <span>Загрузка...</span>
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <script type="module" src="../js/admin.js"></script>
</body>
</html>
