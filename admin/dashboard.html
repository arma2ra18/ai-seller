<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — AI Seller</title>
    <link rel="stylesheet" href="../styles/main.css">
    <style>
        .admin-wrapper {
            display: flex;
            min-height: 100vh;
        }
        .admin-sidebar {
            width: 280px;
            background: #1a1d24;
            border-right: 1px solid #2a2e36;
            padding: 30px 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        .admin-sidebar-logo {
            font-size: 22px;
            font-weight: 600;
            padding: 0 20px 20px;
            border-bottom: 1px solid #2a2e36;
            margin-bottom: 20px;
            color: white;
        }
        .admin-sidebar-menu {
            list-style: none;
        }
        .admin-sidebar-menu li {
            margin-bottom: 5px;
        }
        .admin-sidebar-menu a {
            display: block;
            padding: 12px 25px;
            color: #a0a8c0;
            text-decoration: none;
            border-left: 3px solid transparent;
        }
        .admin-sidebar-menu a:hover,
        .admin-sidebar-menu a.active {
            background: rgba(47,110,214,0.1);
            color: white;
            border-left-color: #2f6ed6;
        }
        .admin-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #2a2e36;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1a1d24;
            border: 1px solid #2a2e36;
            border-radius: 12px;
            padding: 25px;
        }
        .stat-title {
            color: #a0a8c0;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .stat-value {
            font-size: 36px;
            font-weight: 600;
            color: white;
        }
        .recent-activity {
            background: #1a1d24;
            border: 1px solid #2a2e36;
            border-radius: 12px;
            padding: 25px;
        }
        .activity-list {
            list-style: none;
        }
        .activity-item {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #2a2e36;
        }
        .badge-success {
            background: rgba(40,167,69,0.2);
            color: #28a745;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="admin-wrapper">
        <div class="admin-sidebar">
            <div class="admin-sidebar-logo">AI Seller Admin</div>
            <ul class="admin-sidebar-menu">
                <li><a href="dashboard.html" class="active">📊 Дашборд</a></li>
                <li><a href="users.html">👥 Пользователи</a></li>
                <li><a href="#" onclick="alert('В разработке')">💰 Платежи</a></li>
                <li><a href="#" onclick="alert('В разработке')">📝 Логи</a></li>
                <li style="margin-top: 30px;"><a href="#" onclick="logout()">🚪 Выйти</a></li>
            </ul>
        </div>
        
        <div class="admin-content">
            <div class="admin-header">
                <h1>Дашборд</h1>
                <div class="admin-user">
                    <span id="adminEmail">Загрузка...</span>
                    <span class="badge-success">Admin</span>
                </div>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-title">Пользователи</div>
                    <div class="stat-value" id="totalUsers">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Выручка</div>
                    <div class="stat-value" id="totalRevenue">0 ₽</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Генераций</div>
                    <div class="stat-value" id="totalGenerations">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Активных</div>
                    <div class="stat-value" id="activeUsers">0</div>
                </div>
            </div>
            
            <div class="recent-activity">
                <h2>Последние действия</h2>
                <ul class="activity-list" id="activityList">
                    <li class="activity-item"><span>Загрузка...</span></li>
                </ul>
            </div>
        </div>
    </div>

    <script type="module" src="../js/admin.js"></script>
</body>
</html>
