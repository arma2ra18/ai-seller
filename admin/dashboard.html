<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — AI Seller</title>
    <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
    <div class="admin-wrapper">
        <!-- Боковое меню -->
        <div class="admin-sidebar">
            <div class="admin-sidebar-logo">AI Seller Admin</div>
            <ul class="admin-sidebar-menu">
                <li><a href="dashboard.html" class="active"><i>📊</i> Дашборд</a></li>
                <li><a href="users.html"><i>👥</i> Пользователи</a></li>
                <li><a href="logs.html"><i>📝</i> Логи</a></li>
                <li style="margin-top: 30px;"><a href="#" onclick="logout()"><i>🚪</i> Выйти</a></li>
            </ul>
        </div>
        
        <!-- Основной контент -->
        <div class="admin-content">
            <div class="admin-header">
                <h1>Дашборд</h1>
                <div class="admin-user">
                    <span id="adminEmail">Загрузка...</span>
                    <span class="badge badge-success">Admin</span>
                </div>
            </div>
            
            <!-- Карточки статистики -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-title">Пользователи</div>
                    <div class="stat-value" id="totalUsers">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Выручка</div>
                    <div class="stat-value" id="totalRevenue">0 ₽</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Генераций</div>
                    <div class="stat-value" id="totalGenerations">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Админы</div>
                    <div class="stat-value" id="adminCount">0</div>
                </div>
            </div>
            
            <!-- Последние действия -->
            <div class="recent-activity">
                <h2>Последние действия</h2>
                <ul class="activity-list" id="activityList">
                    <li class="activity-item"><span>Загрузка...</span></li>
                </ul>
            </div>
        </div>
    </div>

    <script type="module" src="../js/admin.js"></script>
</body>
</html>
