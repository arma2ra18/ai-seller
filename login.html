<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Prodiger</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">Prodiger</div>
            <h2>Вход в личный кабинет</h2>
            
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="showTab('login')">Вход</button>
                <button class="auth-tab" onclick="showTab('register')">Регистрация</button>
            </div>

            <!-- Вкладка входа -->
<div id="login-tab" class="auth-form active">
    <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="example@mail.ru">
    </div>
    <div class="form-group">
        <label>Пароль</label>
        <input type="password" id="loginPassword" placeholder="••••••••">
    </div>
    
    <button class="btn btn-primary btn-block" onclick="handleEmailLogin()">Войти</button>
    
    <div class="auth-divider">
        <span>или</span>
    </div>
    
    <div class="social-buttons">
        <button class="btn btn-google btn-block" onclick="handleGoogleLogin()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" class="social-icon">
            Войти через Google
        </button>
    </div>
</div>

<!-- Вкладка регистрации -->
<div id="register-tab" class="auth-form">
    <div class="form-group">
        <label>Email</label>
        <input type="email" id="registerEmail" placeholder="example@mail.ru">
    </div>
    <div class="form-group">
        <label>Пароль</label>
        <input type="password" id="registerPassword" placeholder="минимум 6 символов">
    </div>
    
    <button class="btn btn-primary btn-block" onclick="handleEmailRegister()">Зарегистрироваться</button>
    
    <div class="auth-divider">
        <span>или</span>
    </div>
    
    <div class="social-buttons">
        <button class="btn btn-google btn-block" onclick="handleGoogleLogin()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" class="social-icon">
            Google
        </button>
    </div>
    
    <p style="text-align: center; margin-top: 20px; color: var(--text-secondary);">
        После регистрации вы получите 500 рублей на счет
    </p>
</div>

    <!-- Модальное окно для ввода кода из SMS -->
    <div id="codeModal" class="modal">
        <div class="modal-content glass">
            <button class="modal-close" onclick="closeCodeModal()">&times;</button>
            <h2>Подтверждение</h2>
            <p>Мы отправили код на ваш номер телефона</p>
            
            <div class="form-group">
                <label>Код подтверждения</label>
                <input type="text" id="verificationCode" placeholder="123456">
            </div>
            
            <button class="btn btn-primary btn-block" onclick="verifyPhoneCode()">Подтвердить</button>
            <button class="btn btn-link" onclick="resendPhoneCode()">Отправить код повторно</button>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
