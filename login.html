<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — AI Seller</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">AI Seller</div>
            <h2>Вход в личный кабинет</h2>
            
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="showTab('login')">Вход</button>
                <button class="auth-tab" onclick="showTab('register')">Регистрация</button>
            </div>

            <!-- Вкладка входа -->
            <div id="login-tab" class="auth-form active">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="loginPassword" placeholder="••••••••">
                </div>
                <button class="btn btn-primary btn-block" onclick="handleLogin()">Войти</button>
                
                <!-- Разделитель -->
                <div class="auth-divider">
                    <span>или войдите с помощью</span>
                </div>
                
                <!-- Кнопки соцсетей -->
                <div class="social-buttons">
                    <button class="btn btn-google btn-block" onclick="handleGoogleLogin()">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" class="social-icon">
                        Google
                    </button>
                    
                    <button class="btn btn-phone btn-block" onclick="handlePhoneLogin()">
                        <span class="social-icon">📱</span>
                        По номеру телефона
                    </button>
                </div>
                
                <div class="forgot-password">
                    <a href="#" onclick="resetPassword()">Забыли пароль?</a>
                </div>
            </div>

            <!-- Вкладка регистрации (остаётся без изменений) -->
            <div id="register-tab" class="auth-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="registerEmail" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="registerPassword" placeholder="минимум 6 символов">
                </div>
                <div class="form-group">
                    <label>Повторите пароль</label>
                    <input type="password" id="registerConfirm" placeholder="••••••••">
                </div>
                <button class="btn btn-primary btn-block" onclick="handleRegister()">Зарегистрироваться</button>
                
                <div class="auth-divider">
                    <span>или зарегистрируйтесь через</span>
                </div>
                
                <div class="social-buttons">
                    <button class="btn btn-google btn-block" onclick="handleGoogleLogin()">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" class="social-icon">
                        Google
                    </button>
                    
                    <button class="btn btn-phone btn-block" onclick="handlePhoneLogin()">
                        <span class="social-icon">📱</span>
                        По номеру телефона
                    </button>
                </div>
                
                <p style="text-align: center; margin-top: 20px; color: var(--text-secondary);">
                    После регистрации вы получите 30 бесплатных генераций
                </p>
            </div>

            <div id="authMessage" class="auth-message"></div>
        </div>
    </div>

    <!-- Модальное окно для ввода номера телефона -->
    <div id="phoneModal" class="modal">
        <div class="modal-content glass">
            <button class="modal-close" onclick="closePhoneModal()">&times;</button>
            <h2>Вход по номеру телефона</h2>
            <p>Мы отправим SMS с кодом подтверждения</p>
            
            <div class="form-group">
                <label>Номер телефона</label>
                <input type="tel" id="phoneNumber" placeholder="+7 999 123-45-67">
            </div>
            
            <!-- Контейнер для reCAPTCHA -->
            <div id="recaptcha-container"></div>
            
            <button class="btn btn-primary btn-block" onclick="sendPhoneCode()">Отправить код</button>
        </div>
    </div>

    <!-- Модальное окно для ввода кода из SMS -->
    <div id="codeModal" class="modal">
        <div class="modal-content glass">
            <button class="modal-close" onclick="closeCodeModal()">&times;</button>
            <h2>Подтверждение</h2>
            <p>Введите код из SMS</p>
            
            <div class="form-group">
                <label>Код подтверждения</label>
                <input type="text" id="verificationCode" placeholder="123456">
            </div>
            
            <button class="btn btn-primary btn-block" onclick="verifyPhoneCode()">Подтвердить</button>
            <button class="btn btn-link" onclick="resendPhoneCode()">Отправить код повторно</button>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
