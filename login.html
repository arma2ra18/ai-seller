<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — AI Seller</title>
    <link rel="stylesheet" href="styles/main.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: var(--bg-primary);
        }
        
        .auth-card {
            background: var(--bg-card-solid);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s ease;
        }
        
        .auth-logo {
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .auth-card h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
        }
        
        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.03);
            padding: 6px;
            border-radius: 50px;
        }
        
        .auth-tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            color: var(--text-secondary);
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 40px;
            transition: all 0.2s;
        }
        
        .auth-tab.active {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
        }
        
        .auth-form {
            display: none;
        }
        
        .auth-form.active {
            display: block;
            animation: slideUp 0.3s ease;
        }
        
        .auth-message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
            display: none;
        }
        
        .auth-message.error {
            display: block;
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        
        .auth-message.success {
            display: block;
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        
        .auth-message.info {
            display: block;
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }
        
        .forgot-password {
            text-align: center;
            margin-top: 20px;
        }
        
        .forgot-password a {
            color: var(--text-secondary);
            font-size: 14px;
            text-decoration: none;
        }
        
        .forgot-password a:hover {
            color: var(--accent-primary);
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">AI Seller</div>
            <h2>Вход в личный кабинет</h2>
            
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="showTab('login')">Вход</button>
                <button class="auth-tab" onclick="showTab('register')">Регистрация</button>
            </div>

            <!-- Форма входа -->
            <div id="login-tab" class="auth-form active">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="loginPassword" placeholder="••••••••">
                </div>
                <button class="btn btn-primary btn-block" onclick="handleLogin()">
                    Войти
                </button>
                <div class="forgot-password">
                    <a href="#" onclick="resetPassword()">Забыли пароль?</a>
                </div>
            </div>

            <!-- Форма регистрации -->
            <div id="register-tab" class="auth-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="registerEmail" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="registerPassword" placeholder="минимум 6 символов">
                </div>
                <div class="form-group">
                    <label>Повторите пароль</label>
                    <input type="password" id="registerConfirm" placeholder="••••••••">
                </div>
                <button class="btn btn-primary btn-block" onclick="handleRegister()">
                    Зарегистрироваться
                </button>
                <p style="text-align: center; margin-top: 20px; color: var(--text-secondary); font-size: 13px;">
                    После регистрации вы получите 30 бесплатных генераций
                </p>
            </div>

            <div id="authMessage" class="auth-message"></div>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
